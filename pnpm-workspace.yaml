onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver

# A global ignore-scripts=true keeps these native deps out of the build-script
# allowlist, so pnpm parks them in ignoredBuilds. sharp/unrs-resolver ship
# prebuilt binaries and don't need their scripts; esbuild (via vitest) does.
# Skip pnpm's pre-run dep check so the parked ledger doesn't abort dev/build.
verifyDepsBeforeRun: false
